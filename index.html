
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Inverter - Document Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0f172a',
                        surface: '#1e293b',
                        primary: '#3b82f6',
                        accent: '#f43f5e',
                        text: '#f1f5f9',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
        }

        /* PRINT / PDF CONFIGURATION */
        @media print {
            @page {
                size: A4;
                margin: 20mm 15mm 20mm 15mm;
            }

            body {
                background: white !important;
                color: black !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .no-print {
                display: none !important;
            }

            #root, .flex, main {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
                background: transparent !important;
            }

            .printable-content {
                display: block !important;
                border: none !important;
                box-shadow: none !important;
                background: white !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .printable-area {
                padding: 0 !important;
                color: black !important;
            }

            /* Typography for Print */
            h1 {
                font-size: 24pt !important;
                font-weight: 900 !important;
                color: #000 !important;
                margin-bottom: 20pt !important;
                border-bottom: 2pt solid #000 !important;
                padding-bottom: 5pt !important;
                page-break-after: avoid;
            }

            h2 {
                font-size: 18pt !important;
                font-weight: 700 !important;
                color: #333 !important;
                margin-top: 25pt !important;
                margin-bottom: 12pt !important;
                page-break-after: avoid;
            }

            h3 {
                font-size: 14pt !important;
                font-weight: 700 !important;
                margin-top: 15pt !important;
                page-break-after: avoid;
            }

            p, li, td {
                font-size: 11pt !important;
                line-height: 1.6 !important;
                color: #333 !important;
            }

            table {
                width: 100% !important;
                border-collapse: collapse !important;
                margin: 15pt 0 !important;
            }

            th, td {
                border: 1pt solid #ddd !important;
                padding: 8pt !important;
            }

            th {
                background-color: #f8f8f8 !important;
            }

            blockquote {
                border-left: 4pt solid #ccc !important;
                padding-left: 15pt !important;
                margin: 15pt 0 !important;
                font-style: italic !important;
                color: #555 !important;
                background: #fdfdfd !important;
            }

            /* Force new page for H1 and H2 if needed */
            h1, h2 {
                page-break-before: auto;
            }
            
            hr {
                border: none;
                border-top: 1pt solid #eee;
                margin: 30pt 0;
            }
        }

        /* Screen only scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
<script type="importmap">

    "remark-gfm": "https://aistudiocdn.com/remark-gfm@^4.0.1"
  }
}
</script>
</head>
